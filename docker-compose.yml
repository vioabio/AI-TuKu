# ============================================================
# AI-TuKu Docker Compose — 一键启动全栈开发/生产环境
#
# 使用方法:
#   1. 复制 .env.example 为 .env 并填写真实密钥
#   2. docker compose up -d              # 启动所有服务
#   3. docker compose ps                 # 查看服务状态
#   4. docker compose logs -f backend    # 查看后端日志
#   5. docker compose down               # 停止并删除容器
# ============================================================

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: aituku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: vio_tuku
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      # 数据持久化
      - mysql-data:/var/lib/mysql
      # 初始化 SQL 脚本（首次启动时自动执行）
      - ./AI-TUKU-VIO-BE/sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql
      - ./AI-TUKU-VIO-BE/sql/test_data.sql:/docker-entrypoint-initdb.d/02_test_data.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --wait-timeout=28800
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aituku-net

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: aituku-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aituku-net

  # ==================== 后端服务 (Spring Boot) ====================
  backend:
    build:
      context: ./AI-TUKU-VIO-BE
      dockerfile: Dockerfile
    image: aituku-backend:latest
    container_name: aituku-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    environment:
      # Spring Profile — 使用 docker 环境配置
      SPRING_PROFILES_ACTIVE: docker
      # 数据库连接（通过 Docker 网络连接 mysql 服务）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vio_tuku?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      # Redis 连接（通过 Docker 网络连接 redis 服务）
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # 腾讯云 COS 配置（从 .env 注入）
      COS_CLIENT_HOST: ${COS_CLIENT_HOST:-}
      COS_CLIENT_SECRET_ID: ${COS_SECRET_ID:-}
      COS_CLIENT_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_CLIENT_REGION: ${COS_REGION:-}
      COS_CLIENT_BUCKET: ${COS_BUCKET:-}
      # 阿里云 AI 配置
      ALIYUN_AI_API_KEY: ${ALIYUN_AI_API_KEY:-}
      # JVM 参数
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-jar", "/app/app.jar", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - aituku-net

  # ==================== 前端服务 (Vue 3 + Nginx) ====================
  frontend:
    build:
      context: ./AI-TUKU-VIO-FE
      dockerfile: Dockerfile
    image: aituku-frontend:latest
    container_name: aituku-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aituku-net

# ==================== 数据卷 ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ==================== 网络 ====================
networks:
  aituku-net:
    driver: bridge
