# ============================================================
# AI-TuKu GraphQL Profile 配置 (第 9.1 节)
#
# 激活方式:
#   spring.profiles.include: graphql
# 或启动参数:
#   --spring.profiles.active=local,graphql
# ============================================================

spring:
  graphql:
    # 开发环境启用 GraphiQL IDE (图形化查询界面)
    graphiql:
      enabled: true
      path: /graphiql
    # Schema 文件位置
    schema:
      locations: classpath:graphql/
      printer:
        enabled: true
    # 跨域 (GraphQL 端点)
    cors:
      allowed-origins: "http://localhost:5173"
    # WebSocket 订阅 (支持 GraphQL Subscription)
    websocket:
      path: /graphql/ws

aituku:
  graphql:
    enabled: true

# Knife4j 仍用于 REST API 文档，GraphQL 为其补充
# GraphQL 端点: POST /api/graphql
# GraphiQL IDE: GET  /api/graphiql
