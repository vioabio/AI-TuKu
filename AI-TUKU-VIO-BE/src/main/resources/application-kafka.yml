# ============================================================
# AI-TuKu Kafka Streams 事件驱动配置 (第 9.3 节)
#
# 激活方式:
#   spring.profiles.include: kafka
# 或启动参数:
#   --spring.profiles.active=local,kafka
#
# 前置条件:
#   1. Kafka 集群已启动 (本地: docker compose up kafka)
#   2. audit_log 表已创建 (见 AuditEventConsumer.java 注释)
# ============================================================

# Spring Kafka (Producer + Consumer 基础)
spring:
  kafka:
    # Kafka 集群地址
    bootstrap-servers: localhost:9092
    # 生产者配置
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 幂等生产者 (配合 Exactly-Once)
      properties:
        enable.idempotence: true
        # 确认模式: all (所有副本确认)
        acks: all
        # 失败重试
        retries: 3
        # 压缩
        compression.type: snappy
    # 消费者配置
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: aituku-default
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        # 隔离级别: 仅读取已提交的事务消息 (配合 Exactly-Once)
        isolation.level: read_committed

# AI-TuKu 业务配置
aituku:
  kafka:
    streams:
      enabled: true
      application-id: aituku-picture-streams          # Kafka Streams 应用 ID
      bootstrap-servers: ${spring.kafka.bootstrap-servers}
      state-dir: /tmp/aituku-kafka-streams            # RocksDB 状态存储目录
      num-threads: 2                                   # Stream 线程数
      replication-factor: 1                            # 开发环境 1，生产环境 3
      picture-events-partitions: 4                     # picture-events topic 分区数

