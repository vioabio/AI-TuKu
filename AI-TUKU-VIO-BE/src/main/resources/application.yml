# ============================================================
# Actuator 健康检查 + Prometheus 指标（第 6 章可观测性）
# ============================================================
management:
  endpoints:
    web:
      exposure:
        # 暴露的端点：health, info, metrics, prometheus
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 显示健康检查详情（DB/Redis/COS 连通性）
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    tags:
      application: ${spring.application.name}

# ============================================================
