##编写项目的配置文件
server:
  port: 8123
  servlet:
    context-path: /api
spring:
  profiles:
    active: local
  application:
    name: vio_tuku
  datasource:
    url: jdbc:mysql://localhost:3306/vio_tuku
    username: root
    password: your-db-password  # 真实密码在 application-local.yml 中（已 gitignore）
  servlet:
    multipart:
      max-file-size: 20MB
  # Redis 配置
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #逻辑删除
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: v1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.vio.aitukuviobe.interfaces.controller

## 对象存储配置（需要从腾讯云获取）
#cos:
#  client:
#    host: xxx
#    secretId: xxx
#    secretKey: xxx
#    region: xxx
#    bucket: xxx

# ============================================================
# LangChain4j AI 框架配置 (第 20 章)
# 注: 详细配置见 application-langchain4j.yml
# ============================================================
aituku:
  ai:
    enabled: true
    provider: dashscope
    dashscope-api-key: ${ALIYUN_AI_API_KEY:your-api-key}
    chat-model-name: qwen-turbo
    image-model-name: image-out-painting
    max-retries: 3
    timeout: 60

# 旧配置 (已废弃，保留兼容)
## 阿里云 AI 配置
aliYunAi:
  apiKey: your-api-key

  # ============================================================
  # Elasticsearch 搜索引擎配置（第 2.2 章优化）
  # ============================================================
  # 本地开发可跳过此配置，生产环境需配置
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: your-es-password
    connection-timeout: 5s
    socket-timeout: 10s

# ============================================================
# CORS 跨域配置（第 5.4 章安全加固）
# ============================================================
# 生产环境务必配置为具体域名，禁止使用 "*"
cors:
  allowed-origins:
    - http://localhost:5173       # 前端开发服务器
    # - https://your-domain.com   # 生产域名

# ============================================================
# OAuth2 第三方登录配置（第 5.1 章安全加固）
# ============================================================
# 开发环境可不配置，生产环境按需开启
# oauth2:
#   enabled: true
#   platforms:
#     github:
#       client-id: your-github-client-id
#       client-secret: your-github-client-secret
#       redirect-uri: http://localhost:8123/api/oauth/github/callback
#     google:
#       client-id: your-google-client-id
#       client-secret: your-google-client-secret
#       redirect-uri: http://localhost:8123/api/oauth/google/callback
#     wechat:
#       client-id: your-wechat-app-id
#       client-secret: your-wechat-app-secret
#       redirect-uri: http://localhost:8123/api/oauth/wechat/callback

# ============================================================
# Actuator 健康检查 + Prometheus 指标（第 6 章可观测性）
# ============================================================
management:
  endpoints:
    web:
      exposure:
        # 暴露的端点：health, info, metrics, prometheus
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 显示健康检查详情（DB/Redis/COS 连通性）
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    tags:
      application: ${spring.application.name}
  # Zipkin 分布式追踪配置
  tracing:
    sampling:
      probability: 0.1  # 生产环境 10% 采样率（开发环境可调为 1.0）
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# ============================================================
# 安全加固配置（第 5 章）
# ============================================================
aituku:
  security:
    # HTTPS 强制跳转（生产环境开启，开发环境关闭）
    https-only: false
  # Elasticsearch 索引设置（业务层配置）
  elasticsearch:
    # 是否启用 ES 搜索（false 时使用 MySQL LIKE 降级搜索）
    enabled: true
    # ES 索引名称
    index-name: picture_index
    # 批量同步时的每批大小
    batch-size: 500