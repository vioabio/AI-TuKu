##编写项目的配置文件
server:
  port: 8123
  servlet:
    context-path: /api
spring:
  profiles:
    active: local
  application:
    name: vio_tuku
  datasource:
    url: jdbc:mysql://localhost:3306/vio_tuku
    username: root
    password: your-db-password  # 真实密码在 application-local.yml 中（已 gitignore）
  servlet:
    multipart:
      max-file-size: 20MB
  # Redis 配置
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  # Spring Cloud Sleuth 分布式追踪
  sleuth:
    sampler:
      probability: 0.1  # 生产环境 10% 采样率（开发环境可调为 1.0）
  # Zipkin 服务端地址
  zipkin:
    base-url: http://localhost:9411
  # Elasticsearch REST 客户端连接 (Spring Boot 2.7.x → rest 命名空间)
  elasticsearch:
    rest:
      uris: http://localhost:9200
      username: elastic
      password: your-es-password
      connection-timeout: 5s
      read-timeout: 10s
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #逻辑删除
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
# Knife4j 接口文档 (OpenAPI3 / Springdoc)
# 访问: /api/doc.html
knife4j:
  enable: true
  setting:
    language: zh_cn
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.vio.aitukuviobe.interfaces.controller

## 对象存储配置（需要从腾讯云获取）
#cos:
