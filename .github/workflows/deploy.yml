# ============================================================
# AI-TuKu 部署流水线
# 触发: Push → main（代码合并后自动构建镜像 + 推送 + 部署）
#
# 流程:
#   1. 编译 + 测试通过
#   2. 构建 Docker 镜像（后端 + 前端）
#   3. 推送到镜像仓库（Docker Hub / GitHub Container Registry）
#   4. 通知服务器 Webhook 拉取新镜像部署
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
    # 仅在源码变更时触发，跳过纯文档变更
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'

env:
  BACKEND_DIR: AI-TUKU-VIO-BE
  FRONTEND_DIR: AI-TUKU-VIO-FE
  # 镜像仓库配置 — 请在 GitHub Secrets 中配置
  # REGISTRY: ghcr.io / docker.io
  # REGISTRY_USERNAME: 你的用户名
  # REGISTRY_PASSWORD: 你的 Token/密码

jobs:
  # ========== 全量测试 ==========
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # ========== 构建并推送 Docker 镜像 ==========
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    # 仅在 main 分支 push（非 PR）时执行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # 提取版本号（短 commit SHA）
      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 可选：登录 Docker Hub
      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建并推送后端镜像
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aituku-backend:latest
            ghcr.io/${{ github.repository_owner }}/aituku-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建并推送前端镜像
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aituku-frontend:latest
            ghcr.io/${{ github.repository_owner }}/aituku-frontend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 部署通知 ==========
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      # 通过 Webhook 通知服务器拉取新镜像
      - name: Notify Deploy Webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          webhook_secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          data: |
            {
              "event": "deploy",
              "repository": "${{ github.repository }}",
              "commit": "${{ github.sha }}",
              "tag": "${{ steps.meta.outputs.tag }}",
              "images": {
                "backend": "ghcr.io/${{ github.repository_owner }}/aituku-backend:${{ steps.meta.outputs.tag }}",
                "frontend": "ghcr.io/${{ github.repository_owner }}/aituku-frontend:${{ steps.meta.outputs.tag }}"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }

      # 服务器端部署脚本示例（服务器收到 Webhook 后执行）
      # --------------------------------------------------
      # 服务器上的 webhook-receiver.sh:
      #   #!/bin/bash
      #   cd /opt/aituku
      #   docker compose pull
      #   docker compose up -d --remove-orphans
      #   docker image prune -f
      # --------------------------------------------------
      # 此处打印部署摘要
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  AI-TuKu 部署完成"
          echo "============================================"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Tag:        ${{ steps.meta.outputs.tag }}"
          echo "  Backend:    ghcr.io/${{ github.repository_owner }}/aituku-backend:${{ steps.meta.outputs.tag }}"
          echo "  Frontend:   ghcr.io/${{ github.repository_owner }}/aituku-frontend:${{ steps.meta.outputs.tag }}"
          echo "============================================"
