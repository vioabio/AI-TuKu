# ============================================================
# AI-TuKu 测试流水线
# 触发: PR → main / Push → main
# 包含: 后端测试 + 前端测试 + E2E + Docker 构建校验
# ============================================================
name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # 允许 deploy.yml 以 reusable workflow 方式调用本流水线
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false

env:
  BACKEND_DIR: AI-TUKU-VIO-BE
  FRONTEND_DIR: AI-TUKU-VIO-FE

jobs:
  # ========== 后端编译 + 单元测试 ==========
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compile Backend
        run: cd ${{ env.BACKEND_DIR }} && mvn compile -B -q

      - name: Backend Unit Tests
        run: cd ${{ env.BACKEND_DIR }} && mvn test -B
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: ${{ env.BACKEND_DIR }}/target/site/jacoco/

      - name: Verify Coverage Threshold
        run: |
          echo "检查核心模块覆盖率 ≥ 70%..."
          if [ -f ${{ env.BACKEND_DIR }}/target/site/jacoco/index.html ]; then
            # 从 JaCoCo HTML 报告的 footer 提取行覆盖率
            LINE_COVERAGE=$(grep -oP 'Total[^<]*<td[^>]*>\K[0-9]+(?=%)' ${{ env.BACKEND_DIR }}/target/site/jacoco/index.html | head -1 || echo "0")
            if [ -z "$LINE_COVERAGE" ]; then
              LINE_COVERAGE=$(grep -oP '<tfoot>.*?ctr2">\K[0-9]+' ${{ env.BACKEND_DIR }}/target/site/jacoco/index.html | head -1 || echo "N/A")
            fi
            echo "行覆盖率: ${LINE_COVERAGE}%"
            if [ "$LINE_COVERAGE" != "N/A" ] && [ "${LINE_COVERAGE}" -lt 70 ] 2>/dev/null; then
              echo "::warning::覆盖率 ${LINE_COVERAGE}% 低于 70% 阈值"
            elif [ "$LINE_COVERAGE" = "N/A" ]; then
              echo "::notice::无法解析覆盖率，请检查 JaCoCo 报告格式"
            fi
          else
            echo "::notice::未找到 JaCoCo 报告，跳过覆盖率检查"
          fi

  # ========== 前端单元测试 ==========
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install Dependencies
        run: cd ${{ env.FRONTEND_DIR }} && npm ci

      - name: Vitest Unit Tests
        run: cd ${{ env.FRONTEND_DIR }} && npx vitest run --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: ${{ env.FRONTEND_DIR }}/coverage/

  # ========== E2E 测试 ==========
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install Frontend Deps
        run: cd ${{ env.FRONTEND_DIR }} && npm ci

      - name: Install Playwright
        run: cd ${{ env.FRONTEND_DIR }} && npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: cd ${{ env.FRONTEND_DIR }} && npx playwright test

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.FRONTEND_DIR }}/playwright-report/

  # ========== Docker 构建校验（PR 时不推送，仅验证构建通过） ==========
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== OWASP 依赖安全扫描 ==========
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency-Check
        run: cd ${{ env.BACKEND_DIR }} && mvn dependency-check:check -B -q || echo "::warning::存在已知漏洞，请检查报告"

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{ env.BACKEND_DIR }}/target/dependency-check-report.html

  # ========== K6 性能压测 (仅 push main 时触发) ==========
  perf-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 Smoke Test
        run: k6 run --duration 30s --vus 10 ${{ env.FRONTEND_DIR }}/k6/picture-api-load-test.js
        continue-on-error: true
