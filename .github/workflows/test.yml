name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ========== 后端测试 ==========
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Backend Unit Tests
        run: cd AI-TUKU-VIO-BE && mvn test -pl . 2>&1
        env:
          # 集成测试需要 Docker，CI 中跳过
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: AI-TUKU-VIO-BE/target/site/jacoco/

  # ========== 前端测试 ==========
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: AI-TUKU-VIO-FE/package-lock.json

      - name: Install Dependencies
        run: cd AI-TUKU-VIO-FE && npm ci

      - name: Vitest Unit Tests
        run: cd AI-TUKU-VIO-FE && npx vitest run --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: AI-TUKU-VIO-FE/coverage/

  # ========== E2E 测试 ==========
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: AI-TUKU-VIO-FE/package-lock.json

      - name: Install Frontend Deps
        run: cd AI-TUKU-VIO-FE && npm ci

      - name: Install Playwright
        run: cd AI-TUKU-VIO-FE && npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: cd AI-TUKU-VIO-FE && npx playwright test

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: AI-TUKU-VIO-FE/playwright-report/
